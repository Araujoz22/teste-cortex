<!-- HTML -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lente de Peixe de Manicure</title>
    <style>
        /* CSS */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .lente-peixe {
            width: 300px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            margin: 40px auto;
        }
        .lente-peixe img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .manicure {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="lente-peixe">
        <img src="https://via.placeholder.com/300x200" alt="Lente de Peixe">
        <div class="manicure">Manicure</div>
    </div>
    <script>
        // JavaScript
        const lentePeixe = document.querySelector('.lente-peixe');
        const manicure = document.querySelector('.manicure');
        lentePeixe.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            manicure.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>
</html>
